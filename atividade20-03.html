<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade - 20/03</title>
    <script>
        
        var nota = prompt("Digite sua nota: ");

        if ((nota >= 0) && (nota < 5)){
            alert("Reprovado ❌");
        } else if ((nota >= 5) && (nota <= 6.9)){
            alert("Recuperação ⚠️");
        } else if ((nota >= 7) && (nota <= 10)){
            alert("Aprovado ✅");
        } else{
            alert("Número inválido! 🤔");
        }
   
    </script>
</head>
<body>
    <h1>atividade de iw2 - 20/03</h1>
    <p>criar um programa que receba a nota de um aluno e exiba a mensagem correspondente: </p>
    <ul>
        <li>Nota >= 7 → "Aprovado ✅" </li>
        <li>Nota entre 5 e 6.9 → "Recuperação ⚠️"</li>
        <li>Nota < 5 → "Reprovado ❌" </li>
    </ul>
</body>
</html>
